# Server Configuration
server.port=8080

# Spring Data JPA & MySQL Configuration
spring.application.name=missed-call-system
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:exotel_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:aadyvishu@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Exotel API Configuration
exotel.account-sid=${EXOTEL_ACCOUNT_SID:your_account_sid}
exotel.api-key=${EXOTEL_API_KEY:your_api_key}
exotel.api-token=${EXOTEL_API_TOKEN:your_api_token}
exotel.base-url=${EXOTEL_BASE_URL:https://api.exotel.com}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Springdoc OpenAPI (Swagger) Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.exotel=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
